version: 2.1

orbs:
  docker: circleci/docker@2.8.0

commands:
  generate-version-number-dev:
    steps:
    - run:
        command: |
          PIPELINE_NUMBER=<< pipeline.number >>
          if git describe --tags --abbrev=0; then TAG=$(git describe --tags --abbrev=0); else TAG=v0.0.0; fi
          VERSION=${TAG#v}
          echo "VERSION=$(echo "$VERSION" | awk 'BEGIN{FS=OFS="."} {$3+=1} 1')rc${PIPELINE_NUMBER}" >> $BASH_ENV
          source $BASH_ENV
        name: Generate dev version number
  generate-version-number-prod:
    steps:
    - run:
        command: |
          if git describe --tags --abbrev=0; then TAG=$(git describe --tags --abbrev=0); else exit 1; fi
          echo "VERSION=${TAG#v}" >> $BASH_ENV
          source $BASH_ENV
        name: Generate prod version number
  setup-snowflake-cli:
    steps:
    - run:
        command: |
          cd /tmp
          wget https://sfc-repo.snowflakecomputing.com/snowflake-cli/linux_x86_64/3.1.0/snowflake-cli-3.1.0.x86_64.deb
          sudo dpkg -i snowflake-cli-3.1.0.x86_64.deb
          echo $SNOWFLAKE_PRIVATE_KEY_VALUE > $SNOWFLAKE_PRIVATE_KEY_PATH
          sed -i -e 's/\\n/\n/g' $SNOWFLAKE_PRIVATE_KEY_PATH
        name: Install Snowflake CLI and write private key

jobs:
  run-linter:
    docker:
      - image: cimg/python:3.12-node
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            python -m venv .venv
            . .venv/bin/activate
            pip install --no-cache-dir --upgrade pip
            cd service
            pip install --no-cache-dir -r requirements.txt -r requirements-build.txt -r requirements-dev.txt
      - run:
          name: 'Run black / pyright'
          command: |
            . .venv/bin/activate
            black --check .
            pyright

  run-test-docker:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - docker/build:
          path: service
          docker-context: service
          image: mcd/sna-agent-tests
          use-buildkit: true  # to build only the required stages
          extra_build_args: --target tests
          step-name: Run tests in docker build

  deploy:
    machine:
      image: ubuntu-2204:current
    parameters:
      docker_hub_repository:
        type: string
      code_version:
        type: string
    steps:
      - checkout
      - docker/check:
          use-docker-credentials-store: true
      - setup-snowflake-cli
      - run:
          name: Deploy
          command: |
            .circleci/deploy.sh \
              --non-interactive \
              --code-version << parameters.code_version >> \
              --build-number << pipeline.number >> \
              --docker-hub-repo << parameters.docker_hub_repository >> \
              --snowflake-account "$SNOWFLAKE_ACCOUNT" \
              --snowflake-user "$SNOWFLAKE_USER" \
              --snowflake-role "$SNOWFLAKE_ROLE" \
              --snowflake-warehouse "$SNOWFLAKE_WAREHOUSE" \
              --snowflake-private-key-path "$SNOWFLAKE_PRIVATE_KEY_PATH" \
              --snowflake-repo-url "$SNOWFLAKE_REPO_URL" \
              --backend-url-scheme "$BACKEND_URL_SCHEME" \
              --backend-url-host "$BACKEND_URL_HOST"

workflows:
  version: 2

  build-sna:
    jobs:
      - run-linter
      - run-test-docker:
          # run for all tags and branches
          # we need to add this so the job is available for deploy-prod
          filters:
            tags:
              only: /.*/
      - deploy:
          name: deploy-dev
          docker_hub_repository: prerelease-sna-agent
          code_version: ${VERSION}
          pre-steps:
            - checkout
            - generate-version-number-dev
          context:
            - docker
            - snowflake-app-dev
          requires:
            - run-test-docker
            - run-linter
          filters:
            branches:
              only:
                - dev
      - deploy:
          name: deploy-prod
          docker_hub_repository: sna-agent
          code_version: ${VERSION}
          pre-steps:
            - checkout
            - generate-version-number-prod
          context:
            - docker
            - snowflake-app-prod
          requires:
            - run-test-docker
            - run-linter
          filters: # run only for tags starting with v, don't run for branches
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
